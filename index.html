<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C2 Vocab Upgrade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2563eb; --bg: #f8fafc; --card-bg: #ffffff; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }

    header { text-align: center; margin-bottom: 30px; }
    h1 { font-weight: 800; color: #0f172a; margin: 0 0 10px 0; }
    .filter-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; }
    .filter-btn {
      border: none; background: #e2e8f0; color: #475569;
      padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: 0.2s;
    }
    .filter-btn:hover { background: #cbd5e1; }
    .filter-btn.active { background: var(--primary); color: white; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }

    .card {
      background: var(--card-bg); border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      padding: 20px; border-left: 5px solid var(--primary);
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-3px); }

    .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .category-tag { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; font-weight: 600; }

    .word-comparison { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
    .basic-word { text-decoration: line-through; color: #94a3b8; font-size: 1rem; }
    .arrow { color: #cbd5e1; }
    .adv-word { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

    .moment { font-size: 0.95rem; font-weight: 600; color: #334155; margin-bottom: 4px; }
    .definition { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; line-height: 1.4; }

    .example-box { background: #f1f5f9; padding: 10px; border-radius: 6px; font-style: italic; color: #475569; font-size: 0.9rem; }
  </style>
</head>

    const filterContainer = document.getElementById('filter-container');
    categories.forEach(cat => {

      const btn = document.createElement('button');
      btn.className = `filter-btn ${cat === 'All' ? 'active' : ''}`;
      btn.textContent = cat;
      btn.onclick = () => filterCards(cat, btn);
      filterContainer.appendChild(btn);
    });

    renderCards(allData);

    function filterCards(category, btnElement) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btnElement.classList.add('active');
      const filtered = category === 'All' ? allData : allData.filter(item => item.category === category);
      renderCards(filtered);
    }

    function renderCards(data) {
      document.getElementById('app').innerHTML = data.map(item => `
        <div class="card">
          <div class="top-row">
            <span class="category-tag">${item.category}</span>
          </div>
          <div class="word-comparison">
            <span class="basic-word">${item.original}</span>
            <span class="arrow">&#8594;</span>
            <span class="adv-word">${item.advanced}</span>
          </div>
          <div class="moment">${item.moment}</div>
          <div class="definition">${item.meaning}</div>
          <div class="example-box">&#8220;${item.example}&#8221;</div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
